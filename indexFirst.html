<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architectural Tic-Tac-Toe Exact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <div class="name-input-container">
            <input type="text" placeholder="Names input" class="name-input">
        </div>

        <div class="game-board">
            <button class="corner top-left">
                <span class="text">1P</span>
            </button>

            <button class="corner top-right">
                <span class="text">2 players<br>btn</span>
            </button>

            <button class="corner bottom-left">
                <span class="text">Restart<br>btn</span>
            </button>

            <div class="corner bottom-right winner-box">
                <span class="text">Winner<br>name</span>
            </div>

            <div class="circle-area">
                <div class="ttt-grid">
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
